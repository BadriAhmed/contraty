<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Contract Generation Wizard - Residential Lease</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "cat-employment": "#16a34a",
                        "primary-container": "#2563eb",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-tertiary": "#ffffff",
                        "cat-documents": "#94a3b8",
                        "cat-real-estate": "#0ea5e9",
                        "on-tertiary-fixed": "#2a1700",
                        "cat-services": "#3b82f6",
                        "surface": "#faf8ff",
                        "on-tertiary-container": "#ffeedd",
                        "tertiary-container": "#996100",
                        "error-container": "#ffdad6",
                        "on-error": "#ffffff",
                        "background": "#faf8ff",
                        "tertiary-fixed-dim": "#ffb95f",
                        "on-primary-fixed": "#00174b",
                        "success-light": "#dcfce7",
                        "surface-container-highest": "#e1e2ed",
                        "on-secondary-fixed-variant": "#41455f",
                        "inverse-on-surface": "#f0f0fb",
                        "secondary-fixed": "#dde1ff",
                        "surface-container-low": "#f3f3fe",
                        "outline-variant": "#c3c6d7",
                        "bg-page": "#f7f7fb",
                        "outline": "#737686",
                        "cat-family": "#eab308",
                        "primary": "#004ac6",
                        "surface-dim": "#d9d9e5",
                        "inverse-surface": "#2e3039",
                        "primary-fixed": "#dbe1ff",
                        "tertiary": "#784b00",
                        "surface-variant": "#e1e2ed",
                        "on-error-container": "#93000a",
                        "on-primary": "#ffffff",
                        "on-surface": "#191b23",
                        "success-green": "#16a34a",
                        "on-secondary-container": "#5c617c",
                        "border-slate": "#e2e8f0",
                        "cat-business": "#8b5cf6",
                        "surface-bright": "#faf8ff",
                        "on-surface-variant": "#434655",
                        "surface-tint": "#0053db",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#c1c5e3",
                        "on-tertiary-fixed-variant": "#653e00",
                        "tertiary-fixed": "#ffddb8",
                        "text-secondary": "#64748b",
                        "surface-container-high": "#e7e7f3",
                        "secondary": "#585d77",
                        "surface-container": "#ededf9",
                        "inverse-primary": "#b4c5ff",
                        "on-primary-fixed-variant": "#003ea8",
                        "secondary-container": "#dadefd",
                        "on-primary-container": "#eeefff",
                        "on-secondary-fixed": "#151a31",
                        "on-background": "#191b23"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "grid-gap": "1.5rem",
                        "margin-mobile": "1rem",
                        "section-gap": "3rem",
                        "margin-page": "2rem",
                        "container-max": "1280px"
                    },
                    "fontFamily": {
                        "headline-hero-mobile": ["Inter"],
                        "body": ["Inter"],
                        "headline-hero": ["Inter"],
                        "card-title": ["Inter"],
                        "headline-section": ["Inter"],
                        "subtitle": ["Inter"],
                        "mono": ["JetBrains Mono"],
                        "small": ["Inter"]
                    },
                    "fontSize": {
                        "headline-hero-mobile": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "body": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-hero": ["48px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "card-title": ["18px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "headline-section": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "subtitle": ["20px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "mono": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "small": ["14px", { "lineHeight": "1.4", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-field {
            @apply w-full px-4 py-2 border border-border-slate rounded-DEFAULT bg-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent font-body text-body text-on-surface transition-colors;
        }
        .label-text {
            @apply block mb-1 font-small text-small text-on-surface-variant;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- TopNavBar component (suppressed for transactional wizard page, using a simplified header instead) -->
<header class="w-full bg-surface border-b border-border-slate shadow-sm py-4 px-margin-page sticky top-0 z-10">
<div class="max-w-container-max mx-auto flex justify-between items-center">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">description</span>
<span class="font-headline-section text-headline-section font-bold text-primary">Contraty</span>
</div>
<div class="flex items-center gap-4">
<span class="font-small text-small text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-sm">lock</span> Secure Session
                </span>
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1 font-small text-small" type="button">
<span class="material-symbols-outlined text-sm">close</span> Exit Wizard
                </button>
</div>
</div>
</header>
<main class="flex-grow py-section-gap px-margin-mobile md:px-margin-page max-w-[800px] w-full mx-auto flex flex-col gap-8">
<!-- Header & Progress -->
<div class="space-y-6">
<div class="text-center">
<h1 class="font-headline-hero-mobile md:font-headline-hero text-headline-hero-mobile md:text-headline-hero text-on-surface">Residential Lease</h1>
<p class="font-subtitle text-subtitle text-on-surface-variant mt-2">Let's start by defining the parties involved in this agreement.</p>
</div>
<!-- Step Indicator -->
<div class="relative">
<div class="flex justify-between items-center mb-2 px-2">
<!-- Step 1: Active -->
<div class="flex flex-col items-center gap-2 w-1/4 relative z-10">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-bold text-sm shadow-md">1</div>
<span class="font-small text-small text-primary font-semibold hidden md:block">Parties</span>
</div>
<!-- Step 2: Inactive -->
<div class="flex flex-col items-center gap-2 w-1/4 relative z-10 opacity-60">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant border border-outline-variant flex items-center justify-center font-bold text-sm">2</div>
<span class="font-small text-small text-on-surface-variant hidden md:block">Property</span>
</div>
<!-- Step 3: Inactive -->
<div class="flex flex-col items-center gap-2 w-1/4 relative z-10 opacity-60">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant border border-outline-variant flex items-center justify-center font-bold text-sm">3</div>
<span class="font-small text-small text-on-surface-variant hidden md:block">Terms</span>
</div>
<!-- Step 4: Inactive -->
<div class="flex flex-col items-center gap-2 w-1/4 relative z-10 opacity-60">
<div class="w-8 h-8 rounded-full bg-surface-container-highest text-on-surface-variant border border-outline-variant flex items-center justify-center font-bold text-sm">4</div>
<span class="font-small text-small text-on-surface-variant hidden md:block">Review</span>
</div>
</div>
<!-- Progress Bar Background & Fill -->
<div class="absolute top-4 left-0 w-full h-1 bg-surface-container-highest -z-0 rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/4 transition-all duration-500 rounded-full"></div>
</div>
</div>
</div>
<!-- Form Canvas -->
<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-border-slate p-6 md:p-10">
<form class="space-y-section-gap">
<!-- Lessor Details Section -->
<section class="space-y-6">
<div class="flex items-center gap-3 border-b border-border-slate pb-2">
<div class="w-10 h-10 rounded-lg bg-secondary-fixed flex items-center justify-center text-primary-fixed-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">real_estate_agent</span>
</div>
<h2 class="font-headline-section text-headline-section text-on-surface">Lessor Details</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-grid-gap">
<div class="space-y-1">
<label class="label-text" for="lessor-name">Full Legal Name (Landlord)</label>
<input class="input-field" id="lessor-name" placeholder="e.g. Jane Doe" required="" type="text"/>
</div>
<div class="space-y-1">
<label class="label-text" for="lessor-id">Identification / SSN / EIN</label>
<input class="input-field" id="lessor-id" placeholder="XXX-XX-XXXX" required="" type="text"/>
</div>
<div class="space-y-1 md:col-span-2">
<label class="label-text" for="lessor-address">Primary Address</label>
<input class="input-field" id="lessor-address" placeholder="123 Main St, Apt 4B, City, State, ZIP" required="" type="text"/>
</div>
<div class="space-y-1 md:col-span-2">
<label class="label-text" for="lessor-email">Email Address (for notices)</label>
<input class="input-field" id="lessor-email" placeholder="jane.doe@example.com" type="email"/>
</div>
</div>
</section>
<!-- Lessee Details Section -->
<section class="space-y-6">
<div class="flex items-center gap-3 border-b border-border-slate pb-2">
<div class="w-10 h-10 rounded-lg bg-surface-container flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<h2 class="font-headline-section text-headline-section text-on-surface">Lessee Details</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-grid-gap">
<div class="space-y-1">
<label class="label-text" for="lessee-name">Full Legal Name (Tenant)</label>
<input class="input-field" id="lessee-name" placeholder="e.g. John Smith" required="" type="text"/>
</div>
<div class="space-y-1">
<label class="label-text" for="lessee-id">Identification / SSN</label>
<input class="input-field" id="lessee-id" placeholder="XXX-XX-XXXX" required="" type="text"/>
</div>
<div class="space-y-1 md:col-span-2">
<label class="label-text" for="lessee-address">Current Address</label>
<input class="input-field" id="lessee-address" placeholder="456 Elm St, City, State, ZIP" required="" type="text"/>
</div>
</div>
<!-- Additional Tenants Toggle (Micro-interaction example) -->
<div class="pt-4">
<button class="flex items-center gap-2 text-primary font-body text-body font-semibold hover:text-primary-container transition-colors" onclick="document.getElementById('co-tenant-area').classList.toggle('hidden')" type="button">
<span class="material-symbols-outlined">add_circle</span>
                            Add Co-Tenant
                        </button>
<div class="hidden mt-4 p-4 rounded-lg bg-surface-container-low border border-border-slate border-dashed space-y-4" id="co-tenant-area">
<div class="flex justify-between items-center mb-2">
<h3 class="font-card-title text-card-title text-on-surface">Co-Tenant 1</h3>
<button class="text-error hover:text-on-error-container" onclick="document.getElementById('co-tenant-area').classList.add('hidden')" type="button">
<span class="material-symbols-outlined text-sm">delete</span>
</button>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-1">
<label class="label-text">Full Legal Name</label>
<input class="input-field" type="text"/>
</div>
<div class="space-y-1">
<label class="label-text">Identification</label>
<input class="input-field" type="text"/>
</div>
</div>
</div>
</div>
</section>
<!-- Actions -->
<div class="pt-8 mt-8 border-t border-border-slate flex flex-col-reverse md:flex-row justify-between items-center gap-4">
<button class="w-full md:w-auto px-6 py-3 rounded-DEFAULT border border-primary text-primary font-body text-body font-semibold hover:bg-primary-fixed transition-colors" type="button">
                        Cancel
                    </button>
<button class="w-full md:w-auto px-8 py-3 rounded-DEFAULT bg-primary text-on-primary font-body text-body font-semibold hover:bg-primary-container hover:shadow-lg shadow-sm transition-all flex items-center justify-center gap-2" type="button">
                        Next Step
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
<!-- Footer component (suppressed for focus, keeping a minimal one for the wizard) -->
<footer class="mt-auto py-8 text-center text-on-surface-variant font-small text-small border-t border-border-slate">
<p>© 2024 Contraty. Modern Legal Technology.</p>
</footer>
</body></html>
